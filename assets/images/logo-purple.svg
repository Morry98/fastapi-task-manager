<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#AB47BC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B1FA2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g transform="translate(0, 8)">
    <!-- T shape -->
    <rect x="28" y="4" width="8" height="36" rx="4" fill="url(#grad4)"/>
    <rect x="14" y="4" width="36" height="8" rx="4" fill="#AB47BC"/>

    <!-- Background clock circle -->
    <circle cx="32" cy="32" r="16" fill="none" stroke="#9C27B0" stroke-width="3" opacity="0.2"/>

    <!-- Progress arc (suggesting active timer) -->
    <circle cx="32" cy="32" r="16" fill="none" stroke="url(#grad4)" stroke-width="3.5"
            stroke-dasharray="75 100" stroke-linecap="round"
            transform="rotate(-90 32 32)"/>

    <!-- Hour markers at cardinal positions -->
    <line x1="32" y1="17" x2="32" y2="21" stroke="#7B1FA2" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="47" y1="32" x2="43" y2="32" stroke="#7B1FA2" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="32" y1="47" x2="32" y2="43" stroke="#7B1FA2" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="17" y1="32" x2="21" y2="32" stroke="#7B1FA2" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Clock hands -->
    <line x1="32" y1="32" x2="32" y2="24" stroke="#7B1FA2" stroke-width="3" stroke-linecap="round"/>
    <line x1="32" y1="32" x2="38" y2="32" stroke="#7B1FA2" stroke-width="3" stroke-linecap="round"/>

    <!-- Center dot -->
    <circle cx="32" cy="32" r="2.5" fill="#7B1FA2"/>

    <!-- Task sequence dots -->
    <circle cx="22" cy="46" r="2.5" fill="#BA68C8" opacity="0.6"/>
    <circle cx="32" cy="46" r="2.5" fill="#AB47BC" opacity="0.8"/>
    <circle cx="42" cy="46" r="2.5" fill="#9C27B0"/>
  </g>
</svg>
